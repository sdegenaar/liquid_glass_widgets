name: liquid_glass_widgets
description: "A premium set of glassmorphism widgets for Flutter, powered by a custom fragment shader. Features high-fidelity background blur, liquid interactions, dynamic specular highlights, and chromatic aberration. Matches iOS 26 system glass aesthetics."
version: 0.23.0


homepage: https://github.com/sdegenaar/liquid_glass_widgets
repository: https://github.com/sdegenaar/liquid_glass_widgets
issue_tracker: https://github.com/sdegenaar/liquid_glass_widgets/issues

topics:
  - liquid-glass
  - widgets
  - glassmorphism
  - flutter
  - apple

# Platform support declaration for pub.dev
platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  equatable: ^2.0.8
  flutter_shaders: ^0.1.3
  logging: ^1.3.0
  meta: ^1.18.0
dev_dependencies:
  alchemist: ^0.14.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.5

flutter:
  shaders:
    - shaders/lightweight_glass.frag
    - shaders/interactive_indicator.frag
    - shaders/liquid_glass_geometry_blended.frag
    - shaders/liquid_glass_final_render.frag
    - shaders/progressive_blur.frag
