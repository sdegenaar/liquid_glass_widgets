name: Build & Release Liquid Glass Widgets MOBILE

on:
  push:
    branches: [main]
    tags:
      - "v*"

  workflow_dispatch:

concurrency:
  group: mobile-build
  cancel-in-progress: true

jobs:
  mobile:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          cache: true

      - name: Global pub get
        run: |
          set -e
          flutter pub get

      - name: Build Android + iOS apps
        run: |
          set -e

          mkdir -p artifacts/android
          mkdir -p artifacts/ios

          APPS=(
            apple_music
            apple_podcasts
            apple_messages
            apple_news
            showcase
          )

          for APP in "${APPS[@]}"; do
            echo "=============================="
            echo "Building $APP"
            echo "=============================="

            if [ "$APP" = "showcase" ]; then
              ROOT="example/showcase"
              ENTRY="lib/main.dart"
            else
              ROOT="example"
              ENTRY="lib/$APP/${APP}_demo.dart"
            fi

            cd "$GITHUB_WORKSPACE/$ROOT"

            # =========================
            # FIX: ensure valid Flutter app structure
            # =========================
            if [ ! -f "pubspec.yaml" ]; then
              echo "❌ Missing pubspec.yaml in $ROOT"
              exit 1
            fi

            if [ ! -d "android" ] || [ ! -d "ios" ]; then
              echo "⚠️ Missing platform folders — regenerating Flutter app scaffolding..."
              flutter create . --platforms=android,ios
            fi

            # =========================
            # Dependencies (safe single pass)
            # =========================
            flutter pub get

            # =========================
            # Clean build cache (optional but safe here)
            # =========================
            flutter clean
            flutter pub get

            # =========================
            # Android build
            # =========================
            flutter build apk --release -t "$ENTRY"

            cp build/app/outputs/flutter-apk/app-release.apk \
              "$GITHUB_WORKSPACE/artifacts/android/${APP}.apk"

            flutter build appbundle --release -t "$ENTRY"

            cp build/app/outputs/bundle/release/app-release.aab \
              "$GITHUB_WORKSPACE/artifacts/android/${APP}.aab"

            # =========================
            # iOS build
            # =========================
            flutter build ios --release --no-codesign -t "$ENTRY"

            APP_PATH="build/ios/iphoneos/Runner.app"

            if [ ! -d "$APP_PATH" ]; then
              echo "❌ iOS build failed: Runner.app not found"
              ls -R build/ios
              exit 1
            fi

            rm -rf Payload
            mkdir Payload
            cp -R "$APP_PATH" Payload/

            zip -r "${APP}.ipa" Payload

            mv "${APP}.ipa" "$GITHUB_WORKSPACE/artifacts/ios/"

            cd "$GITHUB_WORKSPACE"
          done

      - name: Upload Android builds
        uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: artifacts/android

      - name: Upload iOS IPAs
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipas
          path: artifacts/ios
