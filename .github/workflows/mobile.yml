name: Build & Release Liquid Glass Widgets MOBILE

on:
  push:
    branches: [main]
    tags:
      - "v*"

  workflow_dispatch:

concurrency:
  group: mobile-build
  cancel-in-progress: true

jobs:
  mobile:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==========================================
      # Patch all Dart files before building
      # Replace:
      #   GlassQuality.premium
      # With:
      #   GlassQuality.standard
      # ==========================================
      - name: Patch GlassQuality values
        shell: bash
        run: |
          set -e

          cat > glass_quality.patch <<'PATCH'
          *** Auto-generated CI patch ***
          PATCH

          echo "Scanning Dart files..."

          find . -type f -name "*.dart" | while read -r file; do
            if grep -q "GlassQuality\.premium" "$file"; then
              echo "Patching $file"
              sed -i.bak \
                's/GlassQuality\.premium/GlassQuality.standard/g' \
                "$file"
              rm -f "${file}.bak"
            fi
          done

          echo ""
          echo "Remaining premium references:"
          grep -R "GlassQuality\.premium" . --include="*.dart" || true

          echo ""
          echo "Patched references:"
          grep -R "GlassQuality\.standard" . --include="*.dart" || true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          cache: true

      - name: Global pub get
        run: |
          set -e
          flutter pub get

      - name: Build Android + iOS apps
        shell: bash
        run: |
          set -e

          mkdir -p artifacts/android
          mkdir -p artifacts/ios

          APPS=(
            apple_music
            apple_podcasts
            apple_messages
            apple_news
            showcase
          )

          for APP in "${APPS[@]}"; do
            echo "=============================="
            echo "Building $APP"
            echo "=============================="

            if [ "$APP" = "showcase" ]; then
              ROOT="example/showcase"
              ENTRY="lib/main.dart"
            else
              ROOT="example"
              ENTRY="lib/$APP/${APP}_demo.dart"
            fi

            cd "$GITHUB_WORKSPACE/$ROOT"

            # Ensure Flutter project structure exists
            if [ ! -f "pubspec.yaml" ]; then
              echo "❌ Missing pubspec.yaml in $ROOT"
              exit 1
            fi

            if [ ! -d "android" ] || [ ! -d "ios" ]; then
              echo "⚠️ Missing platform folders — regenerating Flutter scaffolding..."
              flutter create . --platforms=android,ios
            fi

            # Dependencies
            flutter pub get

            # Clean build cache
            flutter clean
            flutter pub get

            # =========================
            # Android APK
            # =========================
            flutter build apk --release -t "$ENTRY"

            cp build/app/outputs/flutter-apk/app-release.apk \
              "$GITHUB_WORKSPACE/artifacts/android/${APP}.apk"

            # =========================
            # Android AAB
            # =========================
            flutter build appbundle --release -t "$ENTRY"

            cp build/app/outputs/bundle/release/app-release.aab \
              "$GITHUB_WORKSPACE/artifacts/android/${APP}.aab"

            # =========================
            # iOS IPA
            # =========================
            flutter build ios \
              --release \
              --no-codesign \
              -t "$ENTRY"

            APP_PATH="build/ios/iphoneos/Runner.app"

            if [ ! -d "$APP_PATH" ]; then
              echo "❌ iOS build failed: Runner.app not found"
              ls -R build/ios
              exit 1
            fi

            rm -rf Payload
            mkdir Payload
            cp -R "$APP_PATH" Payload/

            zip -qry "${APP}.ipa" Payload

            mv "${APP}.ipa" \
              "$GITHUB_WORKSPACE/artifacts/ios/"

            cd "$GITHUB_WORKSPACE"
          done

      - name: Upload Android builds
        uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: artifacts/android

      - name: Upload iOS IPAs
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipas
          path: artifacts/ios
```
