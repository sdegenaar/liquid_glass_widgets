name: Build Portable Desktop Apps (Linux + Windows)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: flutter-desktop-build
  cancel-in-progress: true

jobs:
  # ============================================
  # LINUX
  # ============================================
  linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Enable Linux desktop
        run: |
          cd example
          flutter config --enable-linux-desktop
          flutter create .

      - name: Get dependencies
        run: |
          cd example
          flutter pub get

      - name: Build Linux apps
        run: |
          set -e
          mkdir -p artifacts/linux

          cd example

          APPS=(
            apple_music
            apple_podcasts
            apple_messages
            apple_news
            showcase
          )

          for APP in "${APPS[@]}"; do
            echo "Building Linux: $APP"

            if [ "$APP" = "showcase" ]; then
              ROOT="showcase"
              ENTRY="lib/main.dart"
            else
              ROOT="."
              ENTRY="lib/${APP}/${APP}_demo.dart"
            fi

            cd "$GITHUB_WORKSPACE/example/$ROOT"

            flutter build linux \
              --release \
              -t "$ENTRY"

            mkdir -p "$GITHUB_WORKSPACE/artifacts/linux/$APP"
            cp -r build/linux/x64/release/bundle/* \
              "$GITHUB_WORKSPACE/artifacts/linux/$APP/"

            cd "$GITHUB_WORKSPACE"
          done

      - name: Archive Linux builds
        run: |
          mkdir -p release
          tar -czf release/linux-portable.tar.gz -C artifacts linux

      - uses: actions/upload-artifact@v4
        with:
          name: linux-portable-builds
          path: release/linux-portable.tar.gz


  # ============================================
  # WINDOWS
  # ============================================
  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          cache: true

      - name: Enable Windows desktop
        shell: bash
        run: |
          cd example
          flutter config --enable-windows-desktop
          flutter create .

      - name: Get dependencies
        shell: bash
        run: |
          cd example
          flutter pub get

      - name: Build Windows apps
        shell: bash
        run: |
          set -e
          mkdir -p artifacts/windows

          cd example

          APPS=(
            apple_music
            apple_podcasts
            apple_messages
            apple_news
            showcase
          )

          for APP in "${APPS[@]}"; do
            echo "Building Windows: $APP"

            if [ "$APP" = "showcase" ]; then
              ROOT="showcase"
              ENTRY="lib/main.dart"
            else
              ROOT="."
              ENTRY="lib/${APP}/${APP}_demo.dart"
            fi

            cd "$GITHUB_WORKSPACE/example/$ROOT"

            flutter build windows \
              --release \
              -t "$ENTRY"

            mkdir -p "$GITHUB_WORKSPACE/artifacts/windows/$APP"
            cp -r build/windows/x64/runner/Release/* \
              "$GITHUB_WORKSPACE/artifacts/windows/$APP/"

            cd "$GITHUB_WORKSPACE"
          done

      - name: Archive Windows builds
        shell: bash
        run: |
          mkdir -p release
          tar -czf release/windows-portable.tar.gz -C artifacts windows

      - uses: actions/upload-artifact@v4
        with:
          name: windows-portable-builds
          path: release/windows-portable.tar.gz
