name: Build Portable Desktop Apps (Linux + Windows + macOS)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: flutter-desktop-build
  cancel-in-progress: true

jobs:

  # ============================================
  # LINUX
  # ============================================
  linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      # Initialize BOTH projects
      - name: Enable Linux desktop
        run: |
          set -e

          cd example
          flutter config --enable-linux-desktop
          flutter create .

          cd showcase
          flutter config --enable-linux-desktop
          flutter create .

      - name: Get dependencies
        run: |
          cd example
          flutter pub get

      - name: Build Linux apps
        run: |
          set -e
          mkdir -p artifacts/linux

          cd example

          APPS=(
            apple_music
            apple_podcasts
            apple_messages
            apple_news
            showcase
          )

          for APP in "${APPS[@]}"; do
            echo "=============================="
            echo "Building Linux: $APP"
            echo "=============================="

            # Resolve correct project root + entrypoint
            if [ "$APP" = "showcase" ]; then
              PROJECT_DIR="showcase"
              ENTRY="lib/main.dart"
            else
              PROJECT_DIR="."
              ENTRY="lib/${APP}/${APP}_demo.dart"
            fi

            cd "$PROJECT_DIR"

            # Safe fallback if structure differs
            if [ ! -f "$ENTRY" ]; then
              echo "⚠ Missing expected entry: $ENTRY"
              ENTRY=$(find lib -name "*.dart" | head -n 1)

              if [ -z "$ENTRY" ]; then
                echo "❌ No Dart entry found for $APP"
                exit 1
              fi
            fi

            flutter clean

            flutter build linux \
              --release \
              -t "$ENTRY"

            mkdir -p "../artifacts/linux/$APP"
            cp -r build/linux/x64/release/bundle/* \
              "../artifacts/linux/$APP/"

            cd "$GITHUB_WORKSPACE/example"
          done

      - name: Archive Linux builds
        run: |
          mkdir -p release
          tar -czf release/linux-portable.tar.gz -C artifacts linux

      - uses: actions/upload-artifact@v4
        with:
          name: linux-portable-builds
          path: release/linux-portable.tar.gz


  # ============================================
  # WINDOWS
  # ============================================
  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          cache: true

      # Initialize BOTH projects
      - name: Enable Windows desktop
        shell: bash
        run: |
          set -e

          cd example
          flutter config --enable-windows-desktop
          flutter create .

          cd showcase
          flutter config --enable-windows-desktop
          flutter create .

      - name: Get dependencies
        shell: bash
        run: |
          cd example
          flutter pub get

      - name: Build Windows apps
        shell: bash
        run: |
          set -e
          mkdir -p artifacts/windows

          cd example

          APPS=(
            apple_music
            apple_podcasts
            apple_messages
            apple_news
            showcase
          )

          for APP in "${APPS[@]}"; do
            echo "=============================="
            echo "Building Windows: $APP"
            echo "=============================="

            if [ "$APP" = "showcase" ]; then
              PROJECT_DIR="showcase"
              ENTRY="lib/main.dart"
            else
              PROJECT_DIR="."
              ENTRY="lib/${APP}/${APP}_demo.dart"
            fi

            cd "$PROJECT_DIR"

            if [ ! -f "$ENTRY" ]; then
              echo "⚠ Missing expected entry: $ENTRY"
              ENTRY=$(find lib -name "*.dart" | head -n 1)

              if [ -z "$ENTRY" ]; then
                echo "❌ No Dart entry found for $APP"
                exit 1
              fi
            fi

            flutter clean

            flutter build windows \
              --release \
              -t "$ENTRY"

            mkdir -p "../artifacts/windows/$APP"
            cp -r build/windows/x64/runner/Release/* \
              "../artifacts/windows/$APP/"

            cd "$GITHUB_WORKSPACE/example"
          done

      - name: Archive Windows builds
        shell: bash
        run: |
          mkdir -p release
          tar -czf release/windows-portable.tar.gz -C artifacts windows

      - uses: actions/upload-artifact@v4
        with:
          name: windows-portable-builds
          path: release/windows-portable.tar.gz


  # ============================================
  # MACOS
  # ============================================
  macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          cache: true

      # Initialize BOTH projects
      - name: Enable macOS desktop
        shell: bash
        run: |
          set -e

          cd example
          flutter config --enable-macos-desktop
          flutter create .

          cd showcase
          flutter config --enable-macos-desktop
          flutter create .

      - name: Get dependencies
        shell: bash
        run: |
          cd example
          flutter pub get

      - name: Build macOS apps
        shell: bash
        run: |
          set -e
          mkdir -p artifacts/macos

          cd example

          APPS=(
            apple_music
            apple_podcasts
            apple_messages
            apple_news
            showcase
          )

          for APP in "${APPS[@]}"; do
            echo "=============================="
            echo "Building macOS: $APP"
            echo "=============================="

            # Resolve correct project root + entrypoint
            if [ "$APP" = "showcase" ]; then
              PROJECT_DIR="showcase"
              ENTRY="lib/main.dart"
            else
              PROJECT_DIR="."
              ENTRY="lib/${APP}/${APP}_demo.dart"
            fi

            cd "$PROJECT_DIR"

            # Safe fallback if structure differs
            if [ ! -f "$ENTRY" ]; then
              echo "⚠ Missing expected entry: $ENTRY"
              ENTRY=$(find lib -name "*.dart" | head -n 1)

              if [ -z "$ENTRY" ]; then
                echo "❌ No Dart entry found for $APP"
                exit 1
              fi
            fi

            flutter clean

            flutter build macos \
              --release \
              -t "$ENTRY"

            mkdir -p "../artifacts/macos/$APP"

            # Copy .app bundle
            cp -R build/macos/Build/Products/Release/*.app \
              "../artifacts/macos/$APP/"

            cd "$GITHUB_WORKSPACE/example"
          done

      - name: Archive macOS builds
        shell: bash
        run: |
          mkdir -p release
          tar -czf release/macos-portable.tar.gz -C artifacts macos

      - uses: actions/upload-artifact@v4
        with:
          name: macos-portable-builds
          path: release/macos-portable.tar.gz
