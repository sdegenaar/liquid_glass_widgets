name: Deploy Liquid Glass Website to Pages

on:
  push:
    branches: ["main"]

  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean old builds
        run: |
          rm -rf liquid_glass_widgets
          mkdir -p liquid_glass_widgets

      - name: Get latest release tag and download assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release list \
            -R Internetperson-dev/liquid_glass_widgets \
            --limit 1 \
            --json tagName \
            -q '.[0].tagName')

          echo "Latest tag: $TAG"

          gh release download "$TAG" \
            -R Internetperson-dev/liquid_glass_widgets \
            --pattern "web-canvas-builds.tar.gz" \
            --pattern "wasm-builds.tar.gz" \
            --pattern "web-html-builds.tar.gz"

      - name: Extract and organize builds
        run: |
          set -e
          mkdir -p liquid_glass_widgets

          ########################################
          # CANVAS (no suffix)
          ########################################
          if [ -f web-canvas-builds.tar.gz ]; then
            echo "=== Canvas builds ==="
            mkdir -p canvas_extract
            tar -xzf web-canvas-builds.tar.gz -C canvas_extract

            for index_file in $(find canvas_extract -name "index.html" -type f); do
              app_dir=$(dirname "$index_file")
              app_name=$(basename "$app_dir")

              echo "Canvas: $app_name"
              mkdir -p "liquid_glass_widgets/$app_name"
              cp -r "$app_dir"/* "liquid_glass_widgets/$app_name/"
            done
          fi

          ########################################
          # WASM (_wasm suffix)
          ########################################
          if [ -f wasm-builds.tar.gz ]; then
            echo "=== WASM builds ==="
            mkdir -p wasm_extract
            tar -xzf wasm-builds.tar.gz -C wasm_extract

            for index_file in $(find wasm_extract -name "index.html" -type f); do
              app_dir=$(dirname "$index_file")
              app_name=$(basename "$app_dir")

              target="${app_name}_wasm"

              echo "WASM: $app_name → $target"
              mkdir -p "liquid_glass_widgets/$target"
              cp -r "$app_dir"/* "liquid_glass_widgets/$target/"
            done
          fi

          ########################################
          # HTML (_html suffix)
          ########################################
          if [ -f web-html-builds.tar.gz ]; then
            echo "=== HTML builds ==="
            mkdir -p html_extract
            tar -xzf web-html-builds.tar.gz -C html_extract

            for index_file in $(find html_extract -name "index.html" -type f); do
              app_dir=$(dirname "$index_file")
              app_name=$(basename "$app_dir")

              target="${app_name}_html"

              echo "HTML: $app_name → $target"
              mkdir -p "liquid_glass_widgets/$target"
              cp -r "$app_dir"/* "liquid_glass_widgets/$target/"
            done
          fi

          ########################################
          # Cleanup + debug
          ########################################
          rm -rf canvas_extract wasm_extract html_extract

          echo "=== Final structure ==="
          find liquid_glass_widgets -maxdepth 2 -type d | sort

      - name: Commit updated builds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add liquid_glass_widgets
          git commit -m "Update builds from latest release" || echo "No changes to commit"
          git push

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
