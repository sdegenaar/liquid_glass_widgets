name: Build & Release Liquid Glass Widgets

on:
  push:
    branches: [main]
    tags:
      - "v*"

  workflow_dispatch:

concurrency:
  group: flutter-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT ----------------
      - uses: actions/checkout@v4

      # ---------------- FLUTTER ----------------
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          cache: true

      # ---------------- PUB CACHE ----------------
      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            example/.dart_tool
            example/showcase/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('example/pubspec.lock', 'example/showcase/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # ---------------- BUILD CACHE ----------------
      - name: Cache CMake and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            example/build
            example/showcase/build
            ~/.cmake
            /home/runner/.cmake
          key: ${{ runner.os }}-flutter-build-${{ hashFiles('example/pubspec.lock', 'example/showcase/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-build-

      # ---------------- FLUTTER SETUP ----------------
      - name: Ensure Flutter platforms are configured
        run: |
          # Example app
          cd example
          flutter config --enable-web
          flutter pub get
          flutter create . --platforms web

          # Showcase app
          cd showcase
          flutter config --enable-web
          flutter pub get
          flutter create . --platforms web
          cd ..

      # ---------------- BUILD ----------------
      - name: Build apps
        run: |
          set -e

          BASE="/site/liquid_glass_widgets"

          mkdir -p artifacts/web-html
          mkdir -p artifacts/web-canvas
          mkdir -p artifacts/wasm

          APPS=(
            apple_music
            apple_podcasts
            apple_messages
            apple_news
            showcase
          )

          for APP in "${APPS[@]}"; do
            echo "=============================="
            echo "Building $APP"
            echo "=============================="

            # ---------------- SELECT ROOT ----------------
            if [ "$APP" = "showcase" ]; then
              ROOT="example/showcase"
              ENTRY="lib/main.dart"
            else
              ROOT="example"
              ENTRY="lib/$APP/${APP}_demo.dart"
            fi

            cd "$ROOT"

            flutter pub get

            # ---------------- WEB HTML ----------------
            echo "Building Web HTML for $APP..."

            WEB_HTML_OUT="../../artifacts/web-html/$APP"

            mkdir -p "$WEB_HTML_OUT"

            rm -rf build/web

            flutter build web \
              -t "$ENTRY" \
              --release \
              --base-href "$BASE/${APP}_html/"

            cp -r build/web/* "$WEB_HTML_OUT/"

            # ---------------- WEB CANVAS ----------------
            echo "Building Web Canvas for $APP..."

            WEB_CANVAS_OUT="../../artifacts/web-canvas/$APP"

            mkdir -p "$WEB_CANVAS_OUT"

            rm -rf build/web

            flutter build web \
              -t "$ENTRY" \
              --release \
              --base-href "$BASE/${APP}/"

            cp -r build/web/* "$WEB_CANVAS_OUT/"

            # ---------------- WASM ----------------
            echo "Building WASM for $APP..."

            WASM_OUT="../../artifacts/wasm/$APP"

            mkdir -p "$WASM_OUT"

            rm -rf build/web

            flutter build web \
              -t "$ENTRY" \
              --release \
              --wasm \
              --base-href "$BASE/${APP}_wasm/"

            cp -r build/web/* "$WASM_OUT/"

            cd -
          done

      # ---------------- CREATE RELEASE ARCHIVES ----------------
      - name: Create release archives
        run: |
          cd artifacts/web-html
          tar -czf ../web-html-builds.tar.gz .

          cd ../web-canvas
          tar -czf ../web-canvas-builds.tar.gz .

          cd ../wasm
          tar -czf ../wasm-builds.tar.gz .

          cd ..

          ls -lh *.tar.gz

      # ---------------- UPLOAD ARTIFACTS ----------------
      - uses: actions/upload-artifact@v4
        with:
          name: web-html-builds
          path: artifacts/web-html/

      - uses: actions/upload-artifact@v4
        with:
          name: web-canvas-builds
          path: artifacts/web-canvas/

      - uses: actions/upload-artifact@v4
        with:
          name: wasm-builds
          path: artifacts/wasm/

      # ---------------- GITHUB RELEASE ----------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/web-html-builds.tar.gz
            artifacts/web-canvas-builds.tar.gz
            artifacts/wasm-builds.tar.gz

          tag_name: build-${{ github.run_number }}

          body: |
            Build #${{ github.run_number }}
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}

            Includes:
            - Web HTML Renderer builds
            - Web Canvas Renderer builds
            - WebAssembly (WASM) builds
            - Wanderlust Showcase app (production demo)

          prerelease: true

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
