name: Build Liquid Glass Widgets

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: flutter-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT ----------------
      - uses: actions/checkout@v4

      # ---------------- FLUTTER ----------------
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          cache: true

      # ---------------- LINUX DEPS ----------------
      - run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      # ---------------- FIX PLATFORM SETUP ----------------
      - name: Ensure Flutter platforms are configured
        run: |
          cd example

          flutter config --enable-web
          flutter config --enable-linux-desktop

          # Only initialize platforms if missing
          if [ ! -d "web" ] || [ ! -d "linux" ]; then
            echo "Initializing Flutter platforms..."
            flutter create . --platforms=web,linux
          else
            echo "Platforms already exist"
          fi

      # ---------------- BUILD ----------------
      - name: Build apps
        run: |
          set -e

          cd example
          flutter pub get

          BASE="/liquid_glass_widgets"

          mkdir -p ../artifacts/web ../artifacts/wasm ../artifacts/linux

          APPS=(
            apple_music
            apple_podcasts
            apple_messages
            apple_news
            chem_alert
          )

          for APP in "${APPS[@]}"; do

            ENTRY="lib/$APP/${APP}_demo.dart"

            echo "=============================="
            echo "Building $APP"
            echo "Entry $ENTRY"
            echo "=============================="

            WEB_OUT="../artifacts/web/$APP"
            WASM_OUT="../artifacts/wasm/${APP}_wasm"
            LINUX_OUT="../artifacts/linux/$APP"

            mkdir -p "$WEB_OUT" "$WASM_OUT" "$LINUX_OUT"

            # ---------------- WEB ----------------
            flutter build web \
              -t "$ENTRY" \
              --release \
              --base-href "$BASE/$APP/"

            cp -r build/web/* "$WEB_OUT/"

            # ---------------- WASM ----------------
            flutter build web \
              -t "$ENTRY" \
              --release \
              --wasm \
              --base-href "$BASE/${APP}_wasm/"

            cp -r build/web/* "$WASM_OUT/"

            # ---------------- LINUX ----------------
            flutter build linux \
              -t "$ENTRY" \
              --release

            cp -r build/linux/x64/release/bundle/* "$LINUX_OUT/"

          done

      # ---------------- ARTIFACTS ----------------
      - uses: actions/upload-artifact@v4
        with:
          name: web-builds
          path: artifacts/web/

      - uses: actions/upload-artifact@v4
        with:
          name: wasm-builds
          path: artifacts/wasm/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: artifacts/linux/
