name: Build Liquid Glass Widgets

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: flutter-build
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT ----------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------- FLUTTER ----------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          cache: true

      # ---------------- LINUX DEPENDENCIES ----------------
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev

      # ---------------- BUILD ----------------
      - name: Build all apps (web + wasm + linux)
        run: |
          set -e

          cd example

          flutter pub get

          flutter config --enable-web
          flutter config --enable-linux-desktop

          BASE="/liquid_glass_widgets"

          mkdir -p ../artifacts/web ../artifacts/wasm ../artifacts/linux

          APPS=(
            "apple_music"
            "apple_podcasts"
            "apple_messages"
            "apple_news"
            "chem_alert"
          )

          for APP in "${APPS[@]}"; do

            ENTRY="lib/$APP/${APP}_demo.dart"

            echo "=============================="
            echo "Building: $APP"
            echo "Entry: $ENTRY"
            echo "=============================="

            WEB_OUT="../artifacts/web/$APP"
            WASM_OUT="../artifacts/wasm/${APP}_wasm"
            LINUX_OUT="../artifacts/linux/$APP"

            mkdir -p "$WEB_OUT" "$WASM_OUT" "$LINUX_OUT"

            # ---------------- WEB ----------------
            flutter build web \
              -t "$ENTRY" \
              --release \
              --base-href "$BASE/$APP/"

            cp -r build/web/* "$WEB_OUT/"

            # ---------------- WASM ----------------
            flutter build web \
              -t "$ENTRY" \
              --release \
              --wasm \
              --base-href "$BASE/${APP}_wasm/"

            cp -r build/web/* "$WASM_OUT/"

            # ---------------- LINUX ----------------
            flutter build linux \
              -t "$ENTRY" \
              --release

            cp -r build/linux/x64/release/bundle/* "$LINUX_OUT/"

          done

      # ---------------- ARTIFACTS ----------------
      - name: Upload Web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-builds
          path: artifacts/web/

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-builds
          path: artifacts/wasm/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: artifacts/linux/
