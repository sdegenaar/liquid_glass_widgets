name: Build & Release Liquid Glass Widgets

on:
  push:
    branches: [main]
    tags:
      - "v*"
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: flutter-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT ----------------
      - uses: actions/checkout@v4

      # ---------------- FLUTTER ----------------
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          cache: true

      # ---------------- PUB CACHE ----------------
      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            example/showcase/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('example/showcase/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # ---------------- BUILD CACHE ----------------
      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            example/showcase/build/linux
            example/showcase/build/web
            ~/.cmake
            /home/runner/.cmake
          key: ${{ runner.os }}-flutter-build-${{ hashFiles('example/showcase/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-build-

      # ---------------- LINUX DEPS ----------------
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      # ---------------- FLUTTER SETUP ----------------
      - name: Prepare showcase app (fix platforms)
        run: |
          cd example/showcase

          flutter config --enable-web
          flutter config --enable-linux-desktop

          # ✅ FIX: ensure platform folders exist
          flutter create . --platforms=web,linux

          flutter pub get

      # ---------------- BUILD ----------------
      - name: Build showcase app
        run: |
          set -e
          cd example/showcase

          ENTRY="lib/main.dart"
          APP_NAME="showcase"

          mkdir -p ../../artifacts/web/$APP_NAME \
                   ../../artifacts/wasm/$APP_NAME \
                   ../../artifacts/linux/$APP_NAME

          # ---------------- WEB ----------------
          echo "Building Web ($APP_NAME)..."
          flutter build web \
            -t "$ENTRY" \
            --release \
            --base-href "/liquid_glass_widgets/$APP_NAME/"
          cp -r build/web/* ../../artifacts/web/$APP_NAME/

          # ---------------- WASM ----------------
          echo "Building WASM ($APP_NAME)..."
          flutter build web \
            -t "$ENTRY" \
            --release \
            --wasm \
            --base-href "/liquid_glass_widgets/$APP_NAME/"
          cp -r build/web/* ../../artifacts/wasm/$APP_NAME/

          # ---------------- LINUX ----------------
          echo "Building Linux ($APP_NAME)..."
          rm -rf build/linux build/native_assets
          flutter build linux \
            -t "$ENTRY" \
            --release \
            --no-strip
          
          # Check if bundle exists, if not try alternative path
          if [ -d "build/linux/x64/release/bundle" ]; then
            cp -r build/linux/x64/release/bundle/* ../../artifacts/linux/$APP_NAME/
          elif [ -d "build/linux/release/x64/release/bundle" ]; then
            cp -r build/linux/release/x64/release/bundle/* ../../artifacts/linux/$APP_NAME/
          else
            echo "ERROR: Could not find Linux build output"
            find build/linux -type d -name "bundle" 2>/dev/null || true
            exit 1
          fi

      # ---------------- DISPLAY STRUCTURE ----------------
      - name: Display artifact structure
        run: |
          echo "=== Web artifacts structure ==="
          find artifacts/web -type f | head -20
          echo ""
          echo "=== WASM artifacts structure ==="
          find artifacts/wasm -type f | head -20
          echo ""
          echo "=== Linux artifacts structure ==="
          find artifacts/linux -type f | head -20

      # ---------------- ARCHIVES ----------------
      - name: Create release archives
        run: |
          cd artifacts
          tar -czf web-builds.tar.gz web/
          tar -czf wasm-builds.tar.gz wasm/
          tar -czf linux-builds.tar.gz linux/
          ls -lh *.tar.gz
          
          echo ""
          echo "=== Verifying tar contents ==="
          echo "Web builds tar:"
          tar -tzf web-builds.tar.gz | head -10
          echo ""
          echo "WASM builds tar:"
          tar -tzf wasm-builds.tar.gz | head -10
          echo ""
          echo "Linux builds tar:"
          tar -tzf linux-builds.tar.gz | head -10

      # ---------------- ARTIFACTS ----------------
      - uses: actions/upload-artifact@v4
        with:
          name: web-builds
          path: artifacts/web/

      - uses: actions/upload-artifact@v4
        with:
          name: wasm-builds
          path: artifacts/wasm/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: artifacts/linux/

      # ---------------- RELEASE ----------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/web-builds.tar.gz
            artifacts/wasm-builds.tar.gz
            artifacts/linux-builds.tar.gz
          tag_name: build-${{ github.run_number }}
          body: |
            Showcase Build #${{ github.run_number }}
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
