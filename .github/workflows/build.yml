name: Build & Release Liquid Glass Widgets

on:
  push:
    branches: [main]
    tags:
      - "v*"

  workflow_dispatch:

concurrency:
  group: flutter-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT ----------------
      - uses: actions/checkout@v4

      # ---------------- FLUTTER ----------------
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          cache: true

      # ---------------- PUB CACHE ----------------
      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            example/.dart_tool
            example/showcase/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # ---------------- BUILD CACHE ----------------
      - name: Cache Flutter build artifacts
        uses: actions/cache@v4
        with:
          path: |
            example/build
            example/showcase/build
          key: ${{ runner.os }}-flutter-build-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-build-

      # ---------------- FLUTTER SETUP ----------------
      - name: Setup Flutter Web
        run: |
          cd example
          flutter config --enable-web
          flutter pub get

          cd showcase
          flutter pub get
          cd ..

      # ---------------- BUILD ----------------
      - name: Build Web Apps (HTML / Canvas / WASM)
        run: |
          set -e

          BASE="/site/liquid_glass_widgets"

          mkdir -p ../artifacts/web-html
          mkdir -p ../artifacts/web-canvas
          mkdir -p ../artifacts/wasm

          ############################
          # APP LIST (example demos)
          ############################
          APPS=(
            apple_music
            apple_podcasts
            apple_messages
            apple_news
          )

          get_example_entry() {
            echo "lib/$1/${1}_demo.dart"
          }

          ############################
          # BUILD EXAMPLE APPS
          ############################
          for APP in "${APPS[@]}"; do
            ENTRY=$(get_example_entry "$APP")

            echo "Building example app: $APP ($ENTRY)"

            # -------- HTML --------
            flutter build web \
              -t "$ENTRY" \
              --release \
              --base-href "$BASE/${APP}_html/"

            mkdir -p "../artifacts/web-html/$APP"
            cp -r build/web/* "../artifacts/web-html/$APP/"

            # -------- CANVAS --------
            rm -rf build/web

            flutter build web \
              -t "$ENTRY" \
              --release \
              --base-href "$BASE/${APP}/"

            mkdir -p "../artifacts/web-canvas/$APP"
            cp -r build/web/* "../artifacts/web-canvas/$APP/"

            # -------- WASM --------
            rm -rf build/web

            flutter build web \
              -t "$ENTRY" \
              --release \
              --wasm \
              --base-href "$BASE/${APP}_wasm/"

            mkdir -p "../artifacts/wasm/$APP"
            cp -r build/web/* "../artifacts/wasm/$APP/"
          done

          ############################
          # SHOWCASE APP (IMPORTANT FIX)
          ############################
          SHOWCASE_ENTRY="showcase/lib/main.dart"

          echo "Building SHOWCASE app ($SHOWCASE_ENTRY)"

          # -------- HTML --------
          flutter build web \
            -t "$SHOWCASE_ENTRY" \
            --release \
            --base-href "$BASE/showcase_html/"

          mkdir -p "../artifacts/web-html/showcase"
          cp -r build/web/* "../artifacts/web-html/showcase/"

          # -------- CANVAS --------
          rm -rf build/web

          flutter build web \
            -t "$SHOWCASE_ENTRY" \
            --release \
            --base-href "$BASE/showcase/"

          mkdir -p "../artifacts/web-canvas/showcase"
          cp -r build/web/* "../artifacts/web-canvas/showcase/"

          # -------- WASM --------
          rm -rf build/web

          flutter build web \
            -t "$SHOWCASE_ENTRY" \
            --release \
            --wasm \
            --base-href "$BASE/showcase_wasm/"

          mkdir -p "../artifacts/wasm/showcase"
          cp -r build/web/* "../artifacts/wasm/showcase/"

      # ---------------- ARCHIVES ----------------
      - name: Create release archives
        run: |
          cd artifacts

          tar -czf web-html-builds.tar.gz web-html/
          tar -czf web-canvas-builds.tar.gz web-canvas/
          tar -czf wasm-builds.tar.gz wasm/

          ls -lh *.tar.gz

      # ---------------- UPLOAD ARTIFACTS ----------------
      - uses: actions/upload-artifact@v4
        with:
          name: web-html-builds
          path: artifacts/web-html/

      - uses: actions/upload-artifact@v4
        with:
          name: web-canvas-builds
          path: artifacts/web-canvas/

      - uses: actions/upload-artifact@v4
        with:
          name: wasm-builds
          path: artifacts/wasm/

      # ---------------- RELEASE ----------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/web-html-builds.tar.gz
            artifacts/web-canvas-builds.tar.gz
            artifacts/wasm-builds.tar.gz
          tag_name: build-${{ github.run_number }}
          body: |
            Build #${{ github.run_number }}

            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}

            Includes:
            - Example apps (apple_music, apple_podcasts, apple_messages, apple_news)
            - Showcase app (liquid glass full demo)
            - Web HTML builds
            - Web Canvas builds
            - WebAssembly (WASM) builds

          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
