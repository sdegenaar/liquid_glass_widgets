name: Build & Release Liquid Glass Widgets

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: flutter-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT ----------------
      - uses: actions/checkout@v4

      # ---------------- FLUTTER ----------------
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          cache: true

      # ---------------- PUB CACHE ----------------
      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            example/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('example/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      # ---------------- CMAKE & BUILD CACHE ----------------
      - name: Cache CMake and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            example/build/web
            ~/.cmake
            /home/runner/.cmake
          key: ${{ runner.os }}-flutter-build-${{ hashFiles('example/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-build-
      # ---------------- LINUX DEPS ----------------
      - run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      # ---------------- FLUTTER SETUP ----------------
      - name: Ensure Flutter platforms are configured
        run: |
          cd example
          flutter config --enable-web
          flutter config --enable-linux-desktop
          flutter pub get
          if [ ! -d "web" ] || [ ! -d "linux" ]; then
            flutter create . --platforms=web
          fi
      # ---------------- BUILD ----------------
      - name: Build apps
        run: |
          set -e
          cd example
          flutter pub get
          BASE="/site/liquid_glass_widgets"
          mkdir -p ../artifacts/web ../artifacts/wasm ../artifacts/linux
          APPS=(
            apple_music
            apple_podcasts
            apple_messages
            apple_news
          )
          for APP in "${APPS[@]}"; do
            ENTRY="lib/$APP/${APP}_demo.dart"
            WEB_OUT="../artifacts/web/$APP"
            WASM_OUT="../artifacts/wasm/${APP}_wasm"
            LINUX_OUT="../artifacts/linux/$APP"
            mkdir -p "$WEB_OUT" "$WASM_OUT" "$LINUX_OUT"
            
            # WEB
            echo "Building Web for $APP..."
            flutter build web \
              -t "$ENTRY" \
              --release \
              --base-href "$BASE/$APP/"
            cp -r build/web/* "$WEB_OUT/"
            
            # WASM
            echo "Building WASM for $APP..."
            flutter build web \
              -t "$ENTRY" \
              --release \
              --wasm \
              --base-href "$BASE/${APP}_wasm/"
            cp -r build/web/* "$WASM_OUT/"
            
            # LINUX
            echo "Building Linux for $APP..."
            flutter build linux \
              -t "$ENTRY" \
              --release
            cp -r build/linux/x64/release/bundle/* "$LINUX_OUT/"
          done
            
      # ---------------- CREATE RELEASE ARCHIVES ----------------
      - name: Create release archives
        run: |
          cd artifacts
          tar -czf web-builds.tar.gz web/
          tar -czf wasm-builds.tar.gz wasm/
          tar -czf linux-builds.tar.gz linux/
          ls -lh *.tar.gz
      # ---------------- UPLOAD ARTIFACTS FOR CI ----------------
      - uses: actions/upload-artifact@v4
        with:
          name: web-builds
          path: artifacts/web/

      - uses: actions/upload-artifact@v4
        with:
          name: wasm-builds
          path: artifacts/wasm/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: artifacts/linux/

      # ---------------- CREATE GITHUB RELEASE ----------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/web-builds.tar.gz
            artifacts/wasm-builds.tar.gz
            artifacts/linux-builds.tar.gz
          tag_name: build-${{ github.run_number }}
          body: |
            Build #${{ github.run_number }}
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
