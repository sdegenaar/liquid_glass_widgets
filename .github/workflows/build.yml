name: Build & Release Liquid Glass Widgets

on:
  push:
    branches: [main]
    tags:
      - "v*"
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: flutter-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT ----------------
      - uses: actions/checkout@v4

      # ---------------- FLUTTER ----------------
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          cache: true

      # ---------------- PUB CACHE ----------------
      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            example/showcase/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('example/showcase/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # ---------------- BUILD CACHE ----------------
      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            example/showcase/build/linux
            example/showcase/build/web
            ~/.cmake
            /home/runner/.cmake
          key: ${{ runner.os }}-flutter-build-${{ hashFiles('example/showcase/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-build-

      # ---------------- LINUX DEPS ----------------
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      # ---------------- FLUTTER SETUP ----------------
      - name: Prepare showcase app (fix platforms)
        run: |
          cd example/showcase

          flutter config --enable-web
          flutter config --enable-linux-desktop

          # ✅ FIX: ensure platform folders exist
          flutter create . --platforms=web,linux

          flutter pub get

      # ---------------- PRIME BUILD ----------------
      - name: Prime Linux build environment
        run: |
          cd example/showcase
          flutter build linux --release || true

      # ---------------- BUILD ----------------
      - name: Build showcase app
        run: |
          set -e
          cd example/showcase

          BASE="/site/liquid_glass_widgets/showcase"
          ENTRY="lib/main.dart"

          mkdir -p ../../artifacts/web ../../artifacts/wasm ../../artifacts/linux

          # ---------------- WEB ----------------
          echo "Building Web..."
          flutter build web \
            -t "$ENTRY" \
            --release \
            --base-href "$BASE/"
          cp -r build/web/* ../../artifacts/web/

          # ---------------- WASM ----------------
          echo "Building WASM..."
          flutter build web \
            -t "$ENTRY" \
            --release \
            --wasm \
            --base-href "$BASE/wasm/"
          cp -r build/web/* ../../artifacts/wasm/

          # ---------------- LINUX ----------------
          echo "Building Linux..."
          rm -rf build/linux
          flutter build linux \
            -t "$ENTRY" \
            --release
          cp -r build/linux/x64/release/bundle/* ../../artifacts/linux/

      # ---------------- ARCHIVES ----------------
      - name: Create release archives
        run: |
          cd artifacts
          tar -czf web-builds.tar.gz web/
          tar -czf wasm-builds.tar.gz wasm/
          tar -czf linux-builds.tar.gz linux/
          ls -lh *.tar.gz

      # ---------------- ARTIFACTS ----------------
      - uses: actions/upload-artifact@v4
        with:
          name: web-builds
          path: artifacts/web/

      - uses: actions/upload-artifact@v4
        with:
          name: wasm-builds
          path: artifacts/wasm/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: artifacts/linux/

      # ---------------- RELEASE ----------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/web-builds.tar.gz
            artifacts/wasm-builds.tar.gz
            artifacts/linux-builds.tar.gz
          tag_name: build-${{ github.run_number }}
          body: |
            Showcase Build #${{ github.run_number }}
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
