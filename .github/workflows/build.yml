name: Build Flutter Repo

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: flutter-build
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: apple_music
            entry: lib/apple_music/apple_music_demo.dart

          - name: apple_podcasts
            entry: lib/apple_podcasts/apple_podcasts_demo.dart

          - name: apple_messages
            entry: lib/apple_messages/apple_messages_demo.dart

          - name: apple_news
            entry: lib/apple_news/apple_news_demo.dart

    steps:
      # ---------------- CHECKOUT ----------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------- FLUTTER ----------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          cache: true

      - name: Enable platforms
        run: |
          flutter config --enable-web
          flutter config --enable-linux-desktop

      # ---------------- LINUX DEPENDENCIES ----------------
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev

      # ---------------- PUB GET ----------------
      - name: Get dependencies
        run: flutter pub get

            # ---------------- BUILD ----------------
      - name: Build Flutter (auto-discover entrypoints)
        run: |
          set -e
      
          # ---------------- FIND FLUTTER ROOT ----------------
          FLUTTER_DIR=$(find . -name pubspec.yaml -exec dirname {} \; | head -n 1)
          cd "$FLUTTER_DIR"
      
          echo "Flutter root: $FLUTTER_DIR"
      
          BASE="/liquid_glass_widgets"
      
          mkdir -p ../../artifacts/web ../../artifacts/wasm ../../artifacts/linux
      
          # ---------------- DISCOVER ENTRYPOINTS ----------------
          ENTRIES=$(find lib -name "*_demo.dart")
      
          echo "Found entrypoints:"
          echo "$ENTRIES"
      
          # ---------------- BUILD LOOP ----------------
          for ENTRY_FILE in $ENTRIES; do
      
            APP_NAME=$(basename "$ENTRY_FILE" | sed 's/_demo.dart//')
      
            echo "=============================="
            echo "Building: $APP_NAME"
            echo "Entry: $ENTRY_FILE"
            echo "=============================="
      
            WEB_OUT="../../artifacts/web/$APP_NAME"
            WASM_OUT="../../artifacts/wasm/${APP_NAME}_wasm"
            LINUX_OUT="../../artifacts/linux/$APP_NAME"
      
            # ---------------- WEB ----------------
            flutter build web \
              -t "$ENTRY_FILE" \
              --release \
              --base-href "$BASE/$APP_NAME/"
      
            rm -rf "$WEB_OUT"
            mkdir -p "$WEB_OUT"
            cp -r build/web/* "$WEB_OUT/"
      
            # ---------------- WASM ----------------
            flutter build web \
              -t "$ENTRY_FILE" \
              --release \
              --wasm \
              --base-href "$BASE/${APP_NAME}_wasm/"
      
            rm -rf "$WASM_OUT"
            mkdir -p "$WASM_OUT"
            cp -r build/web/* "$WASM_OUT/"
      
            # ---------------- LINUX ----------------
            flutter build linux \
              -t "$ENTRY_FILE" \
              --release
      
            rm -rf "$LINUX_OUT"
            mkdir -p "$LINUX_OUT"
            cp -r build/linux/x64/release/bundle/* "$LINUX_OUT/"
          done      
    # ---------------- ARTIFACTS ----------------
      - name: Upload Web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-${{ matrix.name }}
          path: artifacts/web/

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-${{ matrix.name }}
          path: artifacts/wasm/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.name }}
          path: artifacts/linux/
