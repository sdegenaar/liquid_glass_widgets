name: Build & Release Liquid Glass Widgets

on:
  push:
    branches: [main]
    tags:
      - "v*"

  workflow_dispatch:

concurrency:
  group: flutter-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT ----------------
      - uses: actions/checkout@v4

      # ---------------- FLUTTER ----------------
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          cache: true

      # ---------------- PUB CACHE ----------------
      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            example/.dart_tool
            example/showcase/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('example/pubspec.lock', 'example/showcase/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # ---------------- BUILD CACHE ----------------
      - name: Cache CMake and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            example/build
            example/showcase/build
            ~/.cmake
            /home/runner/.cmake
          key: ${{ runner.os }}-flutter-build-${{ hashFiles('example/pubspec.lock', 'example/showcase/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-build-

      # ---------------- FLUTTER SETUP ----------------
      - name: Ensure Flutter platforms are configured
        run: |
          set -e

          # Example app
          cd example
          flutter config --enable-web
          flutter pub get
          flutter create . --platforms web

          # Showcase app
          cd showcase
          flutter config --enable-web
          flutter pub get
          flutter create . --platforms web

          cd ../..

      # ---------------- BUILD ----------------
      - name: Build apps
        run: |
          set -e

          BASE="/site/liquid_glass_widgets"
          STAGE="artifacts/site/liquid_glass_widgets"

          rm -rf artifacts release
          mkdir -p "$STAGE"

          APPS=(
            apple_music
            apple_podcasts
            apple_messages
            apple_news
            showcase
          )

          for APP in "${APPS[@]}"; do
            echo "=============================="
            echo "Building $APP"
            echo "=============================="

            if [ "$APP" = "showcase" ]; then
              ROOT="example/showcase"
              ENTRY="lib/main.dart"
            else
              ROOT="example"
              ENTRY="lib/$APP/${APP}_demo.dart"
            fi

            cd "$ROOT"

            flutter pub get

            # =====================================================
            # HTML BUILD
            # =====================================================
            flutter build web \
              -t "$ENTRY" \
              --release \
              --base-href "$BASE/${APP}_html/"

            mkdir -p "../../$STAGE/${APP}_html"
            cp -r build/web/* "../../$STAGE/${APP}_html/"

            rm -rf build/web

            # =====================================================
            # CANVAS BUILD
            # =====================================================
            flutter build web \
              -t "$ENTRY" \
              --release \
              --base-href "$BASE/${APP}/"

            mkdir -p "../../$STAGE/${APP}"
            cp -r build/web/* "../../$STAGE/${APP}/"

            rm -rf build/web

            # =====================================================
            # WASM BUILD
            # =====================================================
            flutter build web \
              -t "$ENTRY" \
              --release \
              --wasm \
              --base-href "$BASE/${APP}_wasm/"

            mkdir -p "../../$STAGE/${APP}_wasm"
            cp -r build/web/* "../../$STAGE/${APP}_wasm/"

            rm -rf build/web

            cd ../..
          done

      # ---------------- CREATE RELEASE ARCHIVES ----------------
      - name: Create release archives
        run: |
          set -e

          FINAL_ROOT="release/site/liquid_glass_widgets"

          mkdir -p "$FINAL_ROOT"

          # ---------------- COPY STAGED OUTPUT ----------------
          cp -r artifacts/site/liquid_glass_widgets/* "$FINAL_ROOT/"

          echo "=== Final Structure ==="
          find release/site/liquid_glass_widgets -maxdepth 1 -type d | sort

          # ---------------- CREATE ARCHIVES ----------------

          # Full site archive
          tar -czf artifacts/liquid-glass-site.tar.gz -C release site

          # HTML-only archive
          mkdir -p temp/html/site/liquid_glass_widgets

          find release/site/liquid_glass_widgets \
            -maxdepth 1 \
            -type d \
            -name "*_html" \
            -exec cp -r {} temp/html/site/liquid_glass_widgets/ \;

          tar -czf artifacts/web-html-builds.tar.gz -C temp/html site

          # Canvas-only archive
          mkdir -p temp/canvas/site/liquid_glass_widgets

          find release/site/liquid_glass_widgets \
            -maxdepth 1 \
            -type d \
            ! -name "*_html" \
            ! -name "*_wasm" \
            ! -path "*/liquid_glass_widgets" \
            -exec cp -r {} temp/canvas/site/liquid_glass_widgets/ \;

          tar -czf artifacts/web-canvas-builds.tar.gz -C temp/canvas site

          # WASM-only archive
          mkdir -p temp/wasm/site/liquid_glass_widgets

          find release/site/liquid_glass_widgets \
            -maxdepth 1 \
            -type d \
            -name "*_wasm" \
            -exec cp -r {} temp/wasm/site/liquid_glass_widgets/ \;

          tar -czf artifacts/wasm-builds.tar.gz -C temp/wasm site

          echo "=== Archives ==="
          ls -lh artifacts/*.tar.gz

      # ---------------- UPLOAD ARTIFACTS ----------------
      - uses: actions/upload-artifact@v4
        with:
          name: liquid-glass-site
          path: release/site

      - uses: actions/upload-artifact@v4
        with:
          name: web-html-builds
          path: artifacts/web-html-builds.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: web-canvas-builds
          path: artifacts/web-canvas-builds.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: wasm-builds
          path: artifacts/wasm-builds.tar.gz

      # ---------------- GITHUB RELEASE ----------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}

          files: |
            artifacts/liquid-glass-site.tar.gz
            artifacts/web-html-builds.tar.gz
            artifacts/web-canvas-builds.tar.gz
            artifacts/wasm-builds.tar.gz

          body: |
            Build #${{ github.run_number }}

            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}

            Includes:
            - Full Liquid Glass Widgets site
            - HTML renderer builds
            - Canvas renderer builds
            - WebAssembly (WASM) builds
            - Showcase app

          prerelease: true

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
