name: Build & Release Liquid Glass Widgets

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: flutter-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        app:
          - apple_music
          - apple_podcasts
          - apple_messages
          - apple_news

    steps:
      # ---------------- CHECKOUT ----------------
      - uses: actions/checkout@v4

      # ---------------- FLUTTER ----------------
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          cache: true

      # ---------------- PUB GET ----------------
      - name: Install dependencies
        run: |
          cd example
          flutter pub get
          flutter config --enable-web
          flutter create . --platforms web

      # ---------------- BUILD VARIABLES ----------------
      - name: Set build paths
        run: |
          echo "APP=${{ matrix.app }}" >> $GITHUB_ENV
          echo "ENTRY=lib/${{ matrix.app }}/${{ matrix.app }}_demo.dart" >> $GITHUB_ENV
          echo "BASE=/site/liquid_glass_widgets" >> $GITHUB_ENV

      # ---------------- WEB HTML BUILD ----------------
      - name: Build Web (HTML)
        run: |
          cd example
          flutter build web \
            -t "$ENTRY" \
            --release \
            --base-href "$BASE/${APP}_html/"

      - name: Collect HTML output
        run: |
          mkdir -p artifacts/web-html/${APP}
          cp -r example/build/web/* artifacts/web-html/${APP}/

      # ---------------- WEB CANVAS BUILD ----------------
      - name: Build Web (Canvas)
        run: |
          cd example
          rm -rf build/web

          flutter build web \
            -t "$ENTRY" \
            --release \
            --base-href "$BASE/${APP}/"

      - name: Collect Canvas output
        run: |
          mkdir -p artifacts/web-canvas/${APP}
          cp -r example/build/web/* artifacts/web-canvas/${APP}/

      # ---------------- WASM BUILD ----------------
      - name: Build Web (WASM)
        run: |
          cd example
          rm -rf build/web

          flutter build web \
            -t "$ENTRY" \
            --release \
            --wasm \
            --base-href "$BASE/${APP}_wasm/"

      - name: Collect WASM output
        run: |
          mkdir -p artifacts/wasm/${APP}
          cp -r example/build/web/* artifacts/wasm/${APP}/

      # ---------------- UPLOAD PER APP ----------------
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-web-builds
          path: artifacts/

  # ---------------- RELEASE JOB (SEPARATE) ----------------
  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create archives
        run: |
          cd artifacts
          sleep 10
          tar -czf web-html-builds.tar.gz . --warning=no-file-changed
          tar -czf web-canvas-builds.tar.gz . --warning=no-file-changed
          tar -czf wasm-builds.tar.gz . --warning=no-file-changed

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          files: |
            artifacts/web-html-builds.tar.gz
            artifacts/web-canvas-builds.tar.gz
            artifacts/wasm-builds.tar.gz
          body: |
            Build #${{ github.run_number }}
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}

            Includes:
            - Web HTML builds
            - Web Canvas builds
            - WebAssembly builds
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
