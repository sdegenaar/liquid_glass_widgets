name: Build Flutter Apps (Production)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: flutter-build
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT ----------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------- FLUTTER ----------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          cache: true

      - name: Enable platforms
        run: |
          flutter config --enable-web
          flutter config --enable-linux-desktop

      # ---------------- DEPENDENCIES ----------------
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev

      # ---------------- GET DEPENDENCIES ----------------
      - name: Pub get
        run: flutter pub get

      # ---------------- DISCOVER VALID APPS ----------------
      - name: Discover Flutter entrypoints
        id: discover
        run: |
          set -e

          echo "Scanning for valid Flutter apps..."

          # ONLY files that actually define main()
          ENTRIES=$(grep -rl "void main" lib || true)

          # filter only demo apps
          ENTRIES=$(echo "$ENTRIES" | grep "_demo.dart" || true)

          echo "Valid entrypoints:"
          echo "$ENTRIES"

          echo "entries<<EOF" >> $GITHUB_OUTPUT
          echo "$ENTRIES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ---------------- BUILD ----------------
      - name: Build all apps safely
        run: |
          set -e
          
          BASE="/liquid_glass_widgets"
          
          mkdir -p artifacts/web artifacts/wasm artifacts/linux
          
          # ---------------- DISCOVER APPS ----------------
          ENTRIES=$(grep -rl "void main" lib || true)
          ENTRIES=$(echo "$ENTRIES" | grep "_demo.dart" || true)
          
          echo "Found entrypoints:"
          echo "$ENTRIES"
          
          if [ -z "$ENTRIES" ]; then
            echo "No valid entrypoints found"
            exit 1
          fi
          
          # ---------------- BUILD LOOP ----------------
          for ENTRY_FILE in $ENTRIES; do
          
            APP_NAME=$(basename "$ENTRY_FILE" | sed 's/_demo.dart//')
          
            echo "=============================="
            echo "Building: $APP_NAME"
            echo "Entry: $ENTRY_FILE"
            echo "=============================="
          
            WEB_OUT="artifacts/web/$APP_NAME"
            WASM_OUT="artifacts/wasm/${APP_NAME}_wasm"
            LINUX_OUT="artifacts/linux/$APP_NAME"
          
            mkdir -p "$WEB_OUT" "$WASM_OUT" "$LINUX_OUT"
          
            # ---------------- WEB ----------------
            if flutter build web \
              -t "$ENTRY_FILE" \
              --release \
              --base-href "$BASE/$APP_NAME/"; then
          
              cp -r build/web/* "$WEB_OUT/"
            else
              echo "❌ WEB failed: $APP_NAME"
              continue
            fi
          
            # ---------------- WASM ----------------
            if flutter build web \
              -t "$ENTRY_FILE" \
              --release \
              --wasm \
              --base-href "$BASE/${APP_NAME}_wasm/"; then
          
              cp -r build/web/* "$WASM_OUT/"
            else
              echo "❌ WASM failed: $APP_NAME"
            fi
          
            # ---------------- LINUX ----------------
            if flutter build linux \
              -t "$ENTRY_FILE" \
              --release; then
          
              cp -r build/linux/x64/release/bundle/* "$LINUX_OUT/"
            else
              echo "❌ LINUX failed: $APP_NAME"
            fi
          
          done
      # ---------------- ARTIFACTS ----------------
      - name: Upload Web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-builds
          path: artifacts/web/

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-builds
          path: artifacts/wasm/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: artifacts/linux/
